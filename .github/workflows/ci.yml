name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      INTERNAL_API_KEY: ci-internal-api-key-change-me
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      MAIL_ENABLED: "0"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
      INTERNAL_API_ORIGIN: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Frontend lint
        run: npm run lint -w frontend

      - name: Frontend typecheck
        run: npm run typecheck -w frontend

      - name: Frontend build
        run: npm run build -w frontend

      - name: Backend lint
        run: npm run lint:check -w backend

      - name: Backend test
        run: npm run test -w backend

      - name: Backend build
        run: npm run build -w backend
