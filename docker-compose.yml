services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - backend-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./apps/backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
      JWT_SECRET: ${JWT_SECRET:-docker-jwt-secret-at-least-32-characters-long}
      CORS_ORIGIN: http://localhost:3001
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: app
      DB_PASSWORD: app
      DB_NAME: app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
      INTERNAL_API_ORIGIN: http://backend:3000

volumes:
  backend-postgres:
