services:
  # 例: `docker compose --profile mysql up` で起動。backend に DB_DRIVER=mysql 等を渡すこと。
  mysql:
    profiles: ["mysql"]
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: rootchange
    volumes:
      - backend-mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootchange"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-3002}:3000"
    environment:
      NODE_ENV: development
      ENABLE_SWAGGER: "1"
      PORT: "3000"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
      JWT_SECRET: ${JWT_SECRET:-docker-jwt-secret-at-least-32-characters-long}
      CORS_ORIGIN: http://localhost:${FRONTEND_HOST_PORT:-3001}
      DB_PATH: /data/sqlite.db
    volumes:
      - .:/workspace
      - backend-node-modules:/workspace/node_modules
      - backend-sqlite:/data
    working_dir: /workspace
    command: sh -c "npm ci -w backend && npm run start:dev -w backend"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-3002}
        INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
        INTERNAL_API_ORIGIN: http://backend:3000
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-3002}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
      INTERNAL_API_ORIGIN: http://backend:3000
      NPM_CONFIG_CACHE: /tmp/.npm
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
      - frontend-node-modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -c "npm ci --legacy-peer-deps && npm run dev -w frontend -- -p 3000"

volumes:
  backend-sqlite:
  backend-mysql:
  backend-node-modules:
  frontend-node-modules:
