services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - backend-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_dev"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    # 開発時は .:/workspace をマウントするため、本番用 ENTRYPOINT は使わない
    entrypoint: []
    ports:
      - "${BACKEND_HOST_PORT:-3002}:3000"
    environment:
      NODE_ENV: development
      ENABLE_SWAGGER: "1"
      PORT: "3000"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
      JWT_SECRET: ${JWT_SECRET:-docker-jwt-secret-at-least-32-characters-long}
      CORS_ORIGIN: http://localhost:${FRONTEND_HOST_PORT:-3001}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: app
      DB_PASSWORD: app
      DB_NAME: app_dev
      MAIL_FROM: noreply@example.com
      FRONTEND_BASE_URL: http://localhost:${FRONTEND_HOST_PORT:-3001}
      NODE_PATH: /workspace/apps/backend/node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace
      - backend-node-modules:/workspace/node_modules
      - backend-app-node-modules:/workspace/apps/backend/node_modules
      - backend-frontend-node-modules:/workspace/apps/frontend/node_modules
    working_dir: /workspace
    command: sh -c "npm ci -w backend && npm run start:dev -w backend"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-3002}
        INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
        INTERNAL_API_ORIGIN: http://backend:3000
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_HOST_PORT:-3002}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-docker-dev-internal-api-key}
      INTERNAL_API_ORIGIN: http://backend:3000
      NPM_CONFIG_CACHE: /tmp/.npm
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
      - frontend-node-modules:/workspace/node_modules
    tmpfs:
      - /workspace/apps/backend/node_modules:uid=${UID:-1000},gid=${GID:-1000},mode=755
      - /workspace/apps/frontend/node_modules:uid=${UID:-1000},gid=${GID:-1000},mode=755
      - /workspace/apps/frontend/.next:uid=${UID:-1000},gid=${GID:-1000},mode=755
    working_dir: /workspace
    command: sh -c "npm ci -w frontend --include-workspace-root=false --legacy-peer-deps --no-audit --no-fund && rm -rf apps/frontend/.next/dev/cache/turbopack apps/frontend/.next/dev/lock && npm run dev -w frontend -- -p 3000"

volumes:
  backend-postgres:
  backend-node-modules:
  backend-app-node-modules:
  backend-frontend-node-modules:
  frontend-node-modules:
